<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorldMind 3D Prototype</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070a10;
      color: #e6edf3;
      overflow: hidden;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #viewport {
      width: 100%;
      height: 100%;
      display: block;
    }
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      width: min(430px, calc(100vw - 24px));
      padding: 12px;
      background: rgba(9, 14, 24, 0.88);
      border: 1px solid #253041;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    .hud h1 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #7bc5ff;
    }
    .status {
      font-size: 0.82rem;
      color: #9fb0c4;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-block;
      border: 1px solid #334760;
      border-radius: 999px;
      font-size: 0.72rem;
      color: #b6dcff;
      padding: 2px 8px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }
    button {
      background: #1b3d61;
      border: 1px solid #2f5f8f;
      color: #eaf6ff;
      border-radius: 6px;
      padding: 6px 9px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    button:hover { background: #295680; }
    .panel {
      margin-top: 8px;
      border: 1px solid #253041;
      border-radius: 6px;
      padding: 8px;
      background: rgba(14, 22, 36, 0.95);
      max-height: 210px;
      overflow: auto;
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .legend {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(9, 14, 24, 0.88);
      border: 1px solid #253041;
      border-radius: 8px;
      padding: 10px;
      width: min(320px, calc(100vw - 24px));
      font-size: 0.76rem;
      color: #9fb0c4;
    }
    .legend strong { color: #d6ecff; }
    .err { color: #ff9d9d; }
    .ok { color: #9dffca; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="viewport"></canvas>
    <aside class="hud">
      <h1>WorldMind 3D Playable Prototype</h1>
      <div class="status" id="status">Loading...</div>
      <div id="meta"></div>
      <div class="actions" id="actions"></div>
      <div class="panel" id="log"></div>
    </aside>
    <section class="legend">
      <div><strong>Controls:</strong> drag = orbit, scroll = zoom, click location = move, click NPC = interact.</div>
      <div><strong>Goal:</strong> test real game flow in 3D form while commands still go through existing play API when available.</div>
      <div id="mode"></div>
    </section>
  </div>
  <script type="module" src="./3d-client.js"></script>
</body>
</html>
